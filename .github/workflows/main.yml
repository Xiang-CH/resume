name: Upload to Cloudflare R2

on:
  push:
    branches:
      - main  # Run when pushing to the main branch
  workflow_dispatch:  # Allow manual trigger

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Put resumes in a folder
        run: |
          mkdir -p resumes
          mv chen_xiang-resume.pdf resumes/
          mv 陈想-简历.pdf resumes/

      - name: Combine Chinese and English versions 
        uses: elMuso/MergePDFs-action@1.1
        with:
          path: resumes
          filename: resume_chen_xiang.pdf

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: resume_chen_xiang.pdf
          destination-dir: ./
          keep-file-fresh: true
